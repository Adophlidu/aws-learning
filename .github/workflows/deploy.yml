name: deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/deploy.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  ROLE_ARN: arn:aws:iam::930698106220:role/github-actions-deploy
  LAMBDA_FUNCTION: profile-api
  S3_BUCKET: profile-frontend-dudu0506
  CLOUDFRONT_ID: E3BVT93IFZLACO
  VITE_API_URL: https://0p7niszs4b.execute-api.ap-southeast-1.amazonaws.com

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Package lambda
        working-directory: backend
        run: |
          npm ci --omit=dev
          zip -r function.zip handler.js mapper.js node_modules package.json
      - name: Deploy lambda
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION" \
            --zip-file fileb://backend/function.zip

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Build web
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm -F web build
      - name: Sync to S3
        run: |
          aws s3 sync frontend/apps/web/dist "s3://$S3_BUCKET" --delete
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_ID" \
            --paths "/*"
