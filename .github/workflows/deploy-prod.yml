# production 分支 → 部署 prod 环境。
# prod 的 GitHub Environment 配 required reviewers → 每个 deploy job 前强制人工审批。
# 也支持手动触发（workflow_dispatch），用于首次 bootstrap / 强制重部署。
name: deploy-prod

on:
  push:
    branches: [production]
    paths:
      - "services/**"
      - "bff/**"
      - "frontend/**"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      services:
        description: "部署两个 Go 服务"
        type: boolean
        default: true
      bff:
        description: "部署 BFF Lambda"
        type: boolean
        default: true
      frontend:
        description: "部署前端"
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.decide.outputs.services }}
      bff: ${{ steps.decide.outputs.bff }}
      frontend: ${{ steps.decide.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            services:
              - 'services/**'
            bff:
              - 'bff/**'
            frontend:
              - 'frontend/**'
      - id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "services=${{ inputs.services }}" >> "$GITHUB_OUTPUT"
            echo "bff=${{ inputs.bff }}" >> "$GITHUB_OUTPUT"
            echo "frontend=${{ inputs.frontend }}" >> "$GITHUB_OUTPUT"
          else
            echo "services=${{ steps.filter.outputs.services }}" >> "$GITHUB_OUTPUT"
            echo "bff=${{ steps.filter.outputs.bff }}" >> "$GITHUB_OUTPUT"
            echo "frontend=${{ steps.filter.outputs.frontend }}" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: changes
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: prod
      deploy_services: ${{ needs.changes.outputs.services == 'true' }}
      deploy_bff: ${{ needs.changes.outputs.bff == 'true' }}
      deploy_frontend: ${{ needs.changes.outputs.frontend == 'true' }}
    secrets: inherit
