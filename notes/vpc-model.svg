<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1260" viewBox="0 0 1440 1260" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="aEnd" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#333"/></marker>
    <marker id="aStart" markerWidth="9" markerHeight="9" refX="2" refY="3" orient="auto"><path d="M7,0 L0,3 L7,6 Z" fill="#333"/></marker>
    <marker id="aDash" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8957e5"/></marker>
    <marker id="aGray" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#6e7781"/></marker>
  </defs>

  <rect x="0" y="0" width="1440" height="1260" fill="#f6f8fa"/>
  <text x="44" y="44" font-size="24" font-weight="700" fill="#1f2328">VPC 整体网络模型（细致版）</text>
  <text x="44" y="68" font-size="13" fill="#57606a">路由表(去向) · 公网IP(能否用IGW) · NACL(子网级·无状态) · 安全组(资源级·有状态)</text>

  <!-- Internet + IGW -->
  <rect x="600" y="86" width="240" height="48" rx="24" fill="#eaeef2" stroke="#8c959f" stroke-width="1.5"/>
  <text x="720" y="115" font-size="13" font-weight="600" fill="#1f2328" text-anchor="middle">Internet · 外部用户 / GitHub</text>
  <rect x="640" y="158" width="160" height="44" rx="6" fill="#fff5e6" stroke="#dd7e09" stroke-width="2"/>
  <text x="720" y="185" font-size="13" font-weight="700" fill="#bb6a06" text-anchor="middle">Internet Gateway</text>
  <line x1="720" y1="134" x2="720" y2="156" stroke="#333" stroke-width="1.8" marker-end="url(#aEnd)" marker-start="url(#aStart)"/>

  <!-- VPC -->
  <rect x="40" y="220" width="1360" height="680" rx="10" fill="#ffffff" stroke="#dd7e09" stroke-width="1.8" stroke-dasharray="7 5"/>
  <text x="62" y="246" font-size="15" font-weight="700" fill="#dd7e09">VPC · 10.0.0.0/16 （区域 ap-southeast-1）</text>
  <line x1="720" y1="202" x2="720" y2="220" stroke="#333" stroke-width="1.8"/>

  <!-- ============ PUBLIC SUBNET ============ -->
  <rect x="66" y="268" width="416" height="606" rx="8" fill="#eef9f1" stroke="#1a7f37" stroke-width="1.6"/>
  <text x="86" y="294" font-size="14" font-weight="700" fill="#1a7f37">公有子网</text>
  <text x="86" y="312" font-size="11" fill="#3a6b48">10.0.1.0/24 · AZ-a</text>

  <!-- route table (public) -->
  <rect x="84" y="324" width="380" height="78" rx="4" fill="#fffaf0" stroke="#d4a72c" stroke-width="1.2"/>
  <rect x="84" y="324" width="380" height="20" rx="4" fill="#fcefc7"/>
  <text x="92" y="339" font-size="10.5" font-weight="700" fill="#7a5b00">关联路由表 rtb-public （= 公有的本质）</text>
  <text x="94" y="361" font-size="10.5" font-family="monospace" fill="#1f2328">目的地</text><text x="250" y="361" font-size="10.5" font-family="monospace" fill="#1f2328">目标</text>
  <text x="94" y="378" font-size="10.5" font-family="monospace" fill="#1f2328">10.0.0.0/16</text><text x="250" y="378" font-size="10.5" font-family="monospace" fill="#1a7f37">local</text>
  <text x="94" y="395" font-size="10.5" font-family="monospace" fill="#1f2328">0.0.0.0/0</text><text x="250" y="395" font-size="10.5" font-family="monospace" font-weight="700" fill="#bb6a06">igw-0a1b ←有这条</text>

  <!-- NACL strip -->
  <rect x="84" y="412" width="380" height="24" rx="4" fill="#fdecea" stroke="#cf222e" stroke-width="1"/>
  <text x="92" y="428" font-size="10.5" fill="#a40e26">NACL（子网级防火墙 · 无状态 · 默认全放行）</text>

  <!-- EC2 with SG -->
  <rect x="92" y="476" width="178" height="138" rx="8" fill="none" stroke="#0969da" stroke-width="1.3" stroke-dasharray="5 3"/>
  <rect x="100" y="470" width="40" height="16" rx="8" fill="#ddeeff" stroke="#0969da"/><text x="120" y="482" font-size="9.5" fill="#0969da" text-anchor="middle">SG</text>
  <rect x="106" y="500" width="150" height="100" rx="6" fill="#fff" stroke="#1a7f37" stroke-width="1.5"/>
  <text x="181" y="526" font-size="12.5" font-weight="600" fill="#1f2328" text-anchor="middle">EC2 跳板机/Web</text>
  <text x="181" y="548" font-size="10" font-family="monospace" fill="#57606a" text-anchor="middle">私有IP 10.0.1.10</text>
  <rect x="118" y="560" width="126" height="20" rx="10" fill="#dff7e6" stroke="#1a7f37"/><text x="181" y="574" font-size="9.5" fill="#1a7f37" text-anchor="middle">公网IP/EIP 52.x.x.x</text>

  <!-- NAT with EIP -->
  <rect x="290" y="476" width="160" height="138" rx="8" fill="none" stroke="#0969da" stroke-width="1.3" stroke-dasharray="5 3"/>
  <rect x="298" y="470" width="40" height="16" rx="8" fill="#ddeeff" stroke="#0969da"/><text x="318" y="482" font-size="9.5" fill="#0969da" text-anchor="middle">SG</text>
  <rect x="304" y="500" width="132" height="100" rx="6" fill="#fff" stroke="#dd7e09" stroke-width="1.5"/>
  <text x="370" y="526" font-size="12.5" font-weight="600" fill="#1f2328" text-anchor="middle">NAT</text>
  <text x="370" y="546" font-size="10" fill="#57606a" text-anchor="middle">Gateway / 实例</text>
  <rect x="316" y="560" width="108" height="20" rx="10" fill="#dff7e6" stroke="#1a7f37"/><text x="370" y="574" font-size="9.5" fill="#1a7f37" text-anchor="middle">公网IP/EIP</text>

  <text x="86" y="648" font-size="10.5" fill="#3a6b48">EC2 有公网IP → 经 IGW 双向通信</text>
  <text x="86" y="666" font-size="10.5" fill="#3a6b48">NAT 替私有子网"代理出网"</text>

  <!-- ============ PRIVATE · APP SUBNET ============ -->
  <rect x="512" y="268" width="416" height="606" rx="8" fill="#eef3fb" stroke="#0969da" stroke-width="1.6"/>
  <text x="532" y="294" font-size="14" font-weight="700" fill="#0969da">私有子网 · 应用</text>
  <text x="532" y="312" font-size="11" fill="#33538a">10.0.2.0/24 · AZ-a</text>

  <rect x="530" y="324" width="380" height="78" rx="4" fill="#fffaf0" stroke="#d4a72c" stroke-width="1.2"/>
  <rect x="530" y="324" width="380" height="20" rx="4" fill="#fcefc7"/>
  <text x="538" y="339" font-size="10.5" font-weight="700" fill="#7a5b00">关联路由表 rtb-app</text>
  <text x="540" y="361" font-size="10.5" font-family="monospace" fill="#1f2328">目的地</text><text x="696" y="361" font-size="10.5" font-family="monospace" fill="#1f2328">目标</text>
  <text x="540" y="378" font-size="10.5" font-family="monospace" fill="#1f2328">10.0.0.0/16</text><text x="696" y="378" font-size="10.5" font-family="monospace" fill="#1a7f37">local</text>
  <text x="540" y="395" font-size="10.5" font-family="monospace" fill="#1f2328">0.0.0.0/0</text><text x="696" y="395" font-size="10.5" font-family="monospace" font-weight="700" fill="#8957e5">nat-09f ←指向NAT</text>

  <rect x="530" y="412" width="380" height="24" rx="4" fill="#fdecea" stroke="#cf222e" stroke-width="1"/>
  <text x="538" y="428" font-size="10.5" fill="#a40e26">NACL（子网级防火墙 · 无状态）</text>

  <rect x="600" y="486" width="240" height="128" rx="8" fill="none" stroke="#0969da" stroke-width="1.3" stroke-dasharray="5 3"/>
  <rect x="608" y="480" width="40" height="16" rx="8" fill="#ddeeff" stroke="#0969da"/><text x="628" y="492" font-size="9.5" fill="#0969da" text-anchor="middle">SG</text>
  <rect x="616" y="508" width="208" height="92" rx="6" fill="#fff" stroke="#0969da" stroke-width="1.5"/>
  <text x="720" y="534" font-size="12.5" font-weight="600" fill="#1f2328" text-anchor="middle">Lambda（进 VPC）</text>
  <text x="720" y="554" font-size="10" fill="#57606a" text-anchor="middle">在子网生成网卡 ENI</text>
  <rect x="632" y="566" width="176" height="22" rx="11" fill="#eee" stroke="#8c959f"/><text x="720" y="581" font-size="9.5" font-family="monospace" fill="#57606a" text-anchor="middle">私有IP 10.0.2.x · 无公网IP</text>

  <text x="532" y="648" font-size="10.5" fill="#33538a">只有私有IP → 出网必须经 NAT</text>
  <text x="532" y="666" font-size="10.5" fill="#33538a">被触发(API Gateway)走 AWS API，与 IP 无关</text>

  <!-- ============ PRIVATE · DATA SUBNET ============ -->
  <rect x="958" y="268" width="416" height="606" rx="8" fill="#f3eefb" stroke="#8250df" stroke-width="1.6"/>
  <text x="978" y="294" font-size="14" font-weight="700" fill="#8250df">私有子网 · 数据</text>
  <text x="978" y="312" font-size="11" fill="#5b3da8">10.0.3.0/24 · AZ-a</text>

  <rect x="976" y="324" width="380" height="78" rx="4" fill="#fffaf0" stroke="#d4a72c" stroke-width="1.2"/>
  <rect x="976" y="324" width="380" height="20" rx="4" fill="#fcefc7"/>
  <text x="984" y="339" font-size="10.5" font-weight="700" fill="#7a5b00">关联路由表 rtb-data</text>
  <text x="986" y="361" font-size="10.5" font-family="monospace" fill="#1f2328">目的地</text><text x="1142" y="361" font-size="10.5" font-family="monospace" fill="#1f2328">目标</text>
  <text x="986" y="378" font-size="10.5" font-family="monospace" fill="#1f2328">10.0.0.0/16</text><text x="1142" y="378" font-size="10.5" font-family="monospace" fill="#1a7f37">local</text>
  <text x="986" y="395" font-size="10.5" font-family="monospace" fill="#cf222e">（无 0.0.0.0/0 → 不通公网）</text>

  <rect x="976" y="412" width="380" height="24" rx="4" fill="#fdecea" stroke="#cf222e" stroke-width="1"/>
  <text x="984" y="428" font-size="10.5" fill="#a40e26">NACL（子网级防火墙 · 无状态）</text>

  <rect x="1046" y="486" width="240" height="128" rx="8" fill="none" stroke="#0969da" stroke-width="1.3" stroke-dasharray="5 3"/>
  <rect x="1054" y="480" width="40" height="16" rx="8" fill="#ddeeff" stroke="#0969da"/><text x="1074" y="492" font-size="9.5" fill="#0969da" text-anchor="middle">SG</text>
  <rect x="1062" y="508" width="208" height="92" rx="6" fill="#fff" stroke="#8250df" stroke-width="1.5"/>
  <text x="1166" y="534" font-size="12.5" font-weight="600" fill="#1f2328" text-anchor="middle">RDS MySQL</text>
  <text x="1166" y="554" font-size="10" fill="#57606a" text-anchor="middle">数据库（主/备可跨 AZ）</text>
  <rect x="1090" y="566" width="152" height="22" rx="11" fill="#eee" stroke="#8c959f"/><text x="1166" y="581" font-size="9.5" font-family="monospace" fill="#57606a" text-anchor="middle">私有IP 10.0.3.x</text>

  <text x="978" y="648" font-size="10.5" font-weight="600" fill="#cf222e">✗ 路由表无出网路由 → 公网无路径可达</text>

  <!-- ============ FLOWS ============ -->
  <!-- IGW <-> EC2 -->
  <path d="M690 202 C470 300, 260 360, 185 472" fill="none" stroke="#333" stroke-width="1.8" marker-end="url(#aEnd)" marker-start="url(#aStart)"/>
  <text x="300" y="430" font-size="11" font-weight="600" fill="#1a7f37" transform="rotate(-12 300 430)">双向（有公网IP）</text>

  <!-- Lambda -> NAT (dashed) -->
  <line x1="598" y1="548" x2="454" y2="548" stroke="#8957e5" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#aDash)"/>
  <text x="462" y="540" font-size="10.5" fill="#8957e5">① 出站→NAT</text>
  <!-- NAT -> IGW (dashed) -->
  <path d="M392 472 C470 330, 620 250, 700 204" fill="none" stroke="#8957e5" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#aDash)"/>
  <text x="470" y="300" font-size="10.5" fill="#8957e5">② →IGW→公网（只出不进）</text>

  <!-- Lambda <-> RDS -->
  <line x1="842" y1="554" x2="1044" y2="554" stroke="#333" stroke-width="1.8" marker-end="url(#aEnd)" marker-start="url(#aStart)"/>
  <text x="943" y="546" font-size="10.5" font-weight="600" fill="#8250df" text-anchor="middle">VPC 内网直连（走 local）</text>

  <text x="62" y="858" font-size="11" fill="#57606a">注：子网绑定单个 AZ；生产中同角色子网会跨多个 AZ（如 AZ-a / AZ-b）做容灾，此处只画一个 AZ 以保持清晰。</text>

  <!-- ============ PACKET PATH PANEL ============ -->
  <rect x="40" y="924" width="1360" height="300" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.2"/>
  <text x="62" y="952" font-size="15" font-weight="700" fill="#1f2328">一个数据包如何"一层层"通过（以外部访问 EC2 的 80 端口为例）</text>

  <!-- inbound row -->
  <text x="62" y="990" font-size="12" font-weight="700" fill="#1a7f37">入站 →</text>
  <g font-size="11" text-anchor="middle">
    <rect x="120" y="972" width="120" height="40" rx="6" fill="#eaeef2" stroke="#8c959f"/><text x="180" y="996" fill="#1f2328">Internet</text>
    <rect x="276" y="972" width="120" height="40" rx="6" fill="#fff5e6" stroke="#dd7e09"/><text x="336" y="996" fill="#1f2328">IGW</text>
    <rect x="432" y="972" width="170" height="40" rx="6" fill="#fffaf0" stroke="#d4a72c"/><text x="517" y="990" fill="#1f2328">路由表</text><text x="517" y="1004" fill="#7a5b00" font-size="9.5">决定送往哪个子网</text>
    <rect x="638" y="972" width="170" height="40" rx="6" fill="#fdecea" stroke="#cf222e"/><text x="723" y="990" fill="#1f2328">NACL 入站</text><text x="723" y="1004" fill="#a40e26" font-size="9.5">子网级 · 无状态</text>
    <rect x="844" y="972" width="180" height="40" rx="6" fill="#eaf2ff" stroke="#0969da"/><text x="934" y="990" fill="#1f2328">安全组 入站</text><text x="934" y="1004" fill="#0969da" font-size="9.5">资源级 · 有状态</text>
    <rect x="1060" y="972" width="120" height="40" rx="6" fill="#eef9f1" stroke="#1a7f37"/><text x="1120" y="996" fill="#1f2328">EC2 资源</text>
  </g>
  <g stroke="#333" stroke-width="1.6" marker-end="url(#aEnd)">
    <line x1="240" y1="992" x2="274" y2="992"/><line x1="396" y1="992" x2="430" y2="992"/><line x1="602" y1="992" x2="636" y2="992"/><line x1="808" y1="992" x2="842" y2="992"/><line x1="1024" y1="992" x2="1058" y2="992"/>
  </g>

  <!-- return row -->
  <text x="62" y="1078" font-size="12" font-weight="700" fill="#8957e5">回程 ←</text>
  <g font-size="11" text-anchor="middle">
    <rect x="120" y="1060" width="120" height="40" rx="6" fill="#eef9f1" stroke="#1a7f37"/><text x="180" y="1084" fill="#1f2328">EC2 响应</text>
    <rect x="276" y="1060" width="180" height="40" rx="6" fill="#eaf2ff" stroke="#0969da"/><text x="366" y="1078" fill="#1f2328">安全组</text><text x="366" y="1092" fill="#1a7f37" font-size="9.5">有状态→自动放行 ✓</text>
    <rect x="492" y="1060" width="200" height="40" rx="6" fill="#fdecea" stroke="#cf222e"/><text x="592" y="1078" fill="#1f2328">NACL 出站</text><text x="592" y="1092" fill="#a40e26" font-size="9.5">无状态→需放行临时端口 ⚠</text>
    <rect x="728" y="1060" width="150" height="40" rx="6" fill="#fffaf0" stroke="#d4a72c"/><text x="803" y="1084" fill="#1f2328">路由表 → IGW</text>
    <rect x="914" y="1060" width="120" height="40" rx="6" fill="#eaeef2" stroke="#8c959f"/><text x="974" y="1084" fill="#1f2328">Internet</text>
  </g>
  <g stroke="#8957e5" stroke-width="1.6" marker-end="url(#aDash)">
    <line x1="240" y1="1080" x2="274" y2="1080"/><line x1="456" y1="1080" x2="490" y2="1080"/><line x1="692" y1="1080" x2="726" y2="1080"/><line x1="878" y1="1080" x2="912" y2="1080"/>
  </g>

  <text x="62" y="1150" font-size="11.5" fill="#1f2328">关键：① 路由表决定"去向"（公私之分）　② 公网IP 才能真正经 IGW（Lambda 无公网IP→出网靠 NAT）</text>
  <text x="62" y="1172" font-size="11.5" fill="#1f2328">　　　③ NACL 子网级、无状态（回程要手动放临时端口）　④ 安全组 资源级、有状态（回程自动放行）　两层都放行才通</text>
  <text x="62" y="1194" font-size="11.5" fill="#1f2328">　　　⑤ 私有子网经 NAT 出网时，NAT 必须在公有子网、并靠 IGW 上网（只出不进）</text>
</svg>
